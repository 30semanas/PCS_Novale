/* ===== módulo: api/gas-adapter.js ===== */
(function(){
/**
 * HuntPro Brasil — gas-adapter.js
 * Implementação do Adapter usando Google Apps Script + Sheets + Drive.
 *
 * Detalhe importante de CORS: enviamos POST com Content-Type text/plain,
 * o que caracteriza uma "simple request" e evita o preflight OPTIONS que
 * o Apps Script não responde. O token vai no corpo (não em header).
 */
const { Adapter } = __M['api/adapter.js'];
const { CONFIG } = __M['config.js'];
class GasAdapter extends Adapter {
  async _call(action, params = {}) {
    const body = JSON.stringify({ action, token: this.token, ...params });
    let res;
    try {
      res = await fetch(CONFIG.API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body,
        redirect: 'follow'
      });
    } catch (e) {
      throw new Error('Falha de rede ao contatar a API. Verifique a URL /exec e sua conexão.');
    }
    let json;
    try { json = await res.json(); }
    catch (e) { throw new Error('Resposta inválida da API (não é JSON). Confirme o deploy do Web App.'); }

    if (!json.ok) throw new Error(json.error || 'Erro na API');
    return json;
  }

  async login(email, senha) {
    const r = await this._call('auth.login', { email, senha });
    this.setToken(r.data.token);
    return r.data;
  }
  async register(dados) {
    const r = await this._call('auth.register', dados);
    this.setToken(r.data.token);
    return r.data;
  }
  async me() { return (await this._call('auth.me')).data; }

  async list(table, opts = {}) {
    const r = await this._call('crud.list', { table, ...opts });
    return r.data;
  }
  async get(table, id) { return (await this._call('crud.get', { table, id })).data; }
  async create(table, data) { return (await this._call('crud.create', { table, data })).data; }
  async update(table, id, data) { return (await this._call('crud.update', { table, id, data })).data; }
  async remove(table, id) { return (await this._call('crud.delete', { table, id })).data; }

  async upload(file) { return (await this._call('files.upload', file)).data; }

  async dashboard() { return (await this._call('dashboard.summary')).data; }

  async report(tipo, params = {}) {
    return (await this._call('reports.' + tipo, params)).data;
  }

  async chatEnviar(canal, texto, anexo_url = '') {
    return (await this._call('chat.enviar', { canal, texto, anexo_url })).data;
  }
  async chatListar(canal) {
    return (await this._call('chat.listar', { canal })).data;
  }
}
Object.assign(__M['api/gas-adapter.js'], { GasAdapter });
})();

/* ===== módulo: api/supabase-adapter.js ===== */
(function(){
/**
 * HuntPro Brasil — supabase-adapter.js
 * Esqueleto para migração futura ao Supabase/PostgreSQL SEM alterar o frontend.
 *
 * Como migrar (resumo):
 *   1. Crie as tabelas no Supabase com os mesmos nomes/colunas do SCHEMAS
 *      (backend/Config.gs). Habilite Row Level Security por tenant_id.
 *   2. Importe o SDK: <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"><\/script>
 *      ou via import ESM.
 *   3. Preencha SUPABASE_URL/SUPABASE_ANON_KEY em config.js e mude BACKEND='supabase'.
 *   4. Implemente os métodos abaixo com o client do Supabase.
 *
 * A assinatura pública é idêntica à do GasAdapter, portanto nenhuma tela muda.
 */
const { Adapter } = __M['api/adapter.js'];
const { CONFIG } = __M['config.js'];
class SupabaseAdapter extends Adapter {
  constructor() {
    super();
    // window.supabase é carregado pelo SDK oficial quando este adapter for usado.
    this.client = (window.supabase && CONFIG.SUPABASE_URL)
      ? window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY)
      : null;
  }

  async login(email, senha) {
    const { data, error } = await this.client.auth.signInWithPassword({ email, password: senha });
    if (error) throw new Error(error.message);
    this.setToken(data.session.access_token);
    return { token: this.token, usuario: data.user };
  }

  async register(dados) {
    const { data, error } = await this.client.auth.signUp({ email: dados.email, password: dados.senha });
    if (error) throw new Error(error.message);
    return { token: data.session?.access_token, usuario: data.user };
  }

  async me() {
    const { data } = await this.client.auth.getUser();
    return data.user;
  }

  async list(table, opts = {}) {
    let q = this.client.from(table).select('*');
    if (opts.where) Object.entries(opts.where).forEach(([k, v]) => { q = q.eq(k, v); });
    if (opts.sort) q = q.order(opts.sort, { ascending: opts.order === 'asc' });
    if (opts.limit) q = q.limit(opts.limit);
    const { data, error } = await q;
    if (error) throw new Error(error.message);
    return data;
  }
  async get(table, id) {
    const { data, error } = await this.client.from(table).select('*').eq('id', id).single();
    if (error) throw new Error(error.message);
    return data;
  }
  async create(table, data) {
    const { data: row, error } = await this.client.from(table).insert(data).select().single();
    if (error) throw new Error(error.message);
    return row;
  }
  async update(table, id, data) {
    const { data: row, error } = await this.client.from(table).update(data).eq('id', id).select().single();
    if (error) throw new Error(error.message);
    return row;
  }
  async remove(table, id) {
    const { error } = await this.client.from(table).delete().eq('id', id);
    if (error) throw new Error(error.message);
    return { id, deleted: true };
  }

  async upload(file) {
    // Migrar uploads para o Supabase Storage aqui.
    throw new Error('upload Supabase ainda não implementado');
  }
  async dashboard() { throw new Error('Implemente via RPC/Views no Supabase'); }
  async report() { throw new Error('Implemente via RPC/Views no Supabase'); }
  async chatEnviar(canal, texto, anexo_url = '') {
    return this.create('mensagens', { canal, texto, anexo_url });
  }
  async chatListar(canal) {
    return this.list('mensagens', { where: { canal }, sort: 'criado_em', order: 'asc' });
  }
}
Object.assign(__M['api/supabase-adapter.js'], { SupabaseAdapter });
})();

/* ===== módulo: core/store.js ===== */
(function(){
/**
 * HuntPro Brasil — store.js
 * Estado global simples e persistência de sessão/tema em localStorage.
 * (Este app é servido estático no GitHub Pages — localStorage é o
 *  mecanismo correto de persistência de sessão no cliente.)
 */
const { CONFIG } = __M['config.js'];
const store = {
  usuario: null,
  token: null,

  carregarSessao() {
    try {
      const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      this.usuario = s.usuario;
      this.token = s.token;
      return s;
    } catch (e) { return null; }
  },

  salvarSessao(usuario, token) {
    this.usuario = usuario;
    this.token = token;
    localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify({ usuario, token }));
  },

  limparSessao() {
    this.usuario = null;
    this.token = null;
    localStorage.removeItem(CONFIG.STORAGE_KEY);
  },

  // ----- Tema (dark/light) -----
  getTema() {
    return localStorage.getItem(CONFIG.TEMA_KEY) || 'dark';
  },
  setTema(tema) {
    localStorage.setItem(CONFIG.TEMA_KEY, tema);
    document.documentElement.setAttribute('data-tema', tema);
  },
  alternarTema() {
    const novo = this.getTema() === 'dark' ? 'light' : 'dark';
    this.setTema(novo);
    return novo;
  }
};
Object.assign(__M['core/store.js'], { store });
})();

const { api } = __M['api/index.js'];

  async login(email, senha) {

                });
                valores[c.nome] = up.url;
              } else if (registro) {
                valores[c.nome] = registro[c.nome] || '';
              } else {
                delete valores[c.nome];
              }
            }
          }

          if (registro) {
            await api.update(tabela_nome, registro.id, valores);
            toast('Alterações salvas.', 'sucesso');
          } else {
            await api.create(tabela_nome, valores);
            toast(schema.singular + ' cadastrado.', 'sucesso');
          }
          fecharModal();
          carregar(container.querySelector('#busca').value);
        } catch (e) {
          toast(e.message, 'erro');
          btn.disabled = false; btn.textContent = 'Salvar';
        }
      };

      // eventos
      if (podeCriar) container.querySelector('#btn-novo').addEventListener('click', () => abrirForm());
      let t;
      container.querySelector('#busca').addEventListener('input', (e) => {
        clearTimeout(t);
        t = setTimeout(() => carregar(e.target.value), 350);
      });

      await carregar();
    }
  };
}
Object.assign(__M['core/crud.js'], { criarModuloCrud });
})();

(function(){

const { store } = __M['core/store.js'];
const { icon } = __M['core/icons.js'];
const { CONFIG } = __M['config.js'];
// Registro de rotas: cada módulo é carregado sob demanda (dynamic import).
const ROTAS = [
  { id: 'dashboard',   label: 'Dashboard',    grupo: 'Operação',   carregar: () => Promise.resolve(__M['modules/dashboard.js']) },
  { id: 'mapa',        label: 'Mapa',         grupo: 'Operação',   carregar: () => Promise.resolve(__M['modules/mapa.js']) },
  { id: 'ocorrencias', label: 'Ocorrências',  grupo: 'Operação',   carregar: () => Promise.resolve(__M['modules/ocorrencias.js']) },

  { id: 'fazendas',    label: 'Fazendas',     grupo: 'Cadastros',  carregar: () => Promise.resolve(__M['modules/fazendas.js']) },
  { id: 'caes',        label: 'Cães',         grupo: 'Cadastros',  carregar: () => Promise.resolve(__M['modules/caes.js']) },
  { id: 'cameras',     label: 'Câmeras Trap', grupo: 'Cadastros',  carregar: () => Promise.resolve(__M['modules/cameras.js']) },

  { id: 'agenda',      label: 'Agenda',       grupo: 'Rede',       carregar: () => Promise.resolve(__M['modules/agenda.js']) },

  { id: 'usuarios',    label: 'Usuários',     grupo: 'Gestão',     carregar: () => Promise.resolve(__M['modules/usuarios.js']) },
  { id: 'admin',       label: 'Administração',grupo: 'Gestão',     carregar: () => Promise.resolve(__M['modules/admin.js']) }
];

const ICONE_MODULO = {
  dashboard: 'dashboard', mapa: 'mapa', ocorrencias: 'ocorrencias', capturas: 'capturas',
  fazendas: 'fazendas', caes: 'caes', cameras: 'cameras', equipes: 'equipes',
  parceiros: 'parceiros', marketplace: 'marketplace', agenda: 'agenda', chat: 'chat',
  relatorios: 'relatorios', usuarios: 'usuarios', admin: 'admin'
};

const router = {
  rotasVisiveis() {
    return ROTAS.filter((r) => auth.pode(r.id, 'read') || r.id === 'dashboard');
  },

  iniciar() {
    window.addEventListener('hashchange', () => this.resolver());
    this.resolver();
  },

  ir(id) { window.location.hash = '#/' + id; },

  async resolver() {
    if (!auth.autenticado()) { this.telaLogin(); return; }

    const hash = (window.location.hash || '#/dashboard').replace('#/', '');
    const id = hash.split('/')[0] || 'dashboard';
    let rota = ROTAS.find((r) => r.id === id);
    if (!rota || (!auth.pode(id, 'read') && id !== 'dashboard')) rota = ROTAS[0];

    this.renderShell(rota.id);
    const alvo = document.getElementById('conteudo');
    alvo.innerHTML = '<div class="p-8"></div>';
    try {
      const mod = await rota.carregar();
      await mod.render(alvo, hash.split('/').slice(1));
    } catch (e) {
      console.error(e);
      alvo.innerHTML = `<div class="p-8 text-red-400">Erro ao carregar o módulo "${rota.label}": ${e.message}</div>`;
    }
  },

  telaLogin() {
    Promise.resolve(__M['modules/login.js']).then((m) => m.render(document.getElementById('app')));
  },

  renderShell(ativo) {
    const app = document.getElementById('app');
    const u = store.usuario || {};
    const grupos = {};
    this.rotasVisiveis().forEach((r) => {
      (grupos[r.grupo] = grupos[r.grupo] || []).push(r);
    });

    const menu = Object.entries(grupos).map(([grupo, rotas]) => `
      <div class="mb-5">
        <p class="px-3 mb-1 text-[10px] font-semibold uppercase tracking-widest muted opacity-70">${grupo}</p>
        ${rotas.map((r) => `
          <a href="#/${r.id}" class="nav-item ${r.id === ativo ? 'nav-ativo' : ''}">
            ${icon(ICONE_MODULO[r.id], 'w-[18px] h-[18px]')}<span>${r.label}</span>
          </a>`).join('')}
      </div>`).join('');

    app.innerHTML = `
      <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
          <div class="flex items-center gap-2 px-4 h-16 border-b border-app">
            <span class="text-brand-400">${icon('boar', 'w-7 h-7')}</span>
            <div>
              <p class="font-display font-bold leading-none">HuntPro</p>
              <p class="text-[10px] muted tracking-wide">BRASIL</p>
            </div>
          </div>
          <nav class="flex-1 overflow-y-auto py-4 px-2">${menu}</nav>
          <div class="border-t border-app p-3">
            <div class="flex items-center gap-2 px-2 py-2">
              <div class="w-8 h-8 rounded-full bg-brand-500/20 text-brand-300 flex items-center justify-center text-sm font-semibold">
                ${(u.nome || '?').charAt(0).toUpperCase()}
              </div>
              <div class="min-w-0 flex-1">
                <p class="text-sm font-medium truncate">${u.nome || 'Usuário'}</p>
                <p class="text-[10px] muted truncate">${u.papel || ''}</p>
              </div>
              <button id="btn-sair" class="icon-btn" title="Sair">${icon('sair', 'w-4 h-4')}</button>
            </div>
          </div>
        </aside>

        <!-- Área principal -->
        <div class="flex-1 flex flex-col min-w-0">
          <header class="h-16 border-b border-app flex items-center justify-between px-4 md:px-6 shrink-0">
            <button id="btn-menu" class="icon-btn md:hidden">${icon('menu')}</button>
            <div class="flex-1"></div>
            <button id="btn-tema" class="icon-btn" title="Alternar tema">
              ${store.getTema() === 'dark' ? icon('sol') : icon('lua')}
            </button>
          </header>
          <main id="conteudo" class="flex-1 overflow-y-auto"></main>
        </div>
      </div>
      <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>`;

    document.getElementById('btn-sair').addEventListener('click', () => {
      auth.logout(); window.location.hash = ''; this.telaLogin();
    });
    document.getElementById('btn-tema').addEventListener('click', () => {
      store.alternarTema(); this.renderShell(ativo);
    });
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    document.getElementById('btn-menu')?.addEventListener('click', () => {
      sidebar.classList.toggle('sidebar-aberta'); overlay.classList.toggle('hidden');
    });
    overlay.addEventListener('click', () => {
      sidebar.classList.remove('sidebar-aberta'); overlay.classList.add('hidden');
    });
  }
};
Object.assign(__M['core/router.js'], { router });
})();

(function(){
/** HuntPro Brasil — módulo Chat da equipe (canais + polling). */
const { api } = __M['api/index.js'];
const { store } = __M['core/store.js'];
const { cabecalhoPagina, spinner, toast } = __M['core/ui.js'];
const { icon } = __M['core/icons.js'];
const CANAIS = ['geral', 'operacoes', 'matilha', 'marketplace'];
let intervalo = null;

async function render(container) {
  let canal = 'geral';
  if (intervalo) clearInterval(intervalo);

  container.innerHTML = `
    <div class="p-6 md:p-8 flex flex-col" style="height:calc(100vh - 4rem)">
      ${cabecalhoPagina('Chat', 'Comunicação em tempo quase real com sua equipe')}
      <div class="flex gap-2 mb-3">
        ${CANAIS.map((c) => `
          <button class="canal btn-ghost text-sm ${c === canal ? '!bg-brand-500/20 !text-brand-300' : ''}" data-canal="${c}"># ${c}</button>`).join('')}
      </div>
      <div id="mensagens" class="flex-1 overflow-y-auto surface border border-app rounded-xl p-4 space-y-3">${spinner()}</div>
      <form id="form-msg" class="flex gap-2 mt-3">
        <input id="txt" class="input flex-1" placeholder="Escreva uma mensagem…" autocomplete="off">
        <button class="btn-primary px-4">${icon('enviar', 'w-4 h-4')}</button>
      </form>
    </div>`;

  const msgsEl = container.querySelector('#mensagens');
  const meuId = store.usuario?.id;

  const carregar = async (scroll = false) => {
    try {
      const msgs = await api.chatListar(canal);
      renderMsgs(msgs);
      if (scroll) msgsEl.scrollTop = msgsEl.scrollHeight;
    } catch (e) {
      msgsEl.innerHTML = `<p class="text-red-400 text-sm">${e.message}</p>`;
    }
  };

  const renderMsgs = (msgs) => {
    if (!msgs.length) { msgsEl.innerHTML = '<p class="muted text-sm text-center py-8">Nenhuma mensagem em #' + canal + '. Comece a conversa!</p>'; return; }
    const perto = msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight < 80;
    msgsEl.innerHTML = msgs.map((m) => {
      const meu = m.remetente_id === meuId;
      return `<div class="flex ${meu ? 'justify-end' : 'justify-start'}">
        <div class="max-w-[75%] ${meu ? 'bg-brand-500/25' : 'bg-black/20'} rounded-2xl px-4 py-2">
          ${!meu ? `<p class="text-[11px] font-semibold text-brand-300 mb-0.5">${m.remetente_nome || 'Usuário'}</p>` : ''}
          <p class="text-sm whitespace-pre-wrap break-words">${escapar(m.texto)}</p>
          <p class="text-[10px] muted mt-1 text-right">${hora(m.criado_em)}</p>
        </div>
      </div>`;
    }).join('');
    if (perto) msgsEl.scrollTop = msgsEl.scrollHeight;
  };

  const trocarCanal = (c) => {
    canal = c;
    container.querySelectorAll('.canal').forEach((b) => {
      b.classList.toggle('!bg-brand-500/20', b.dataset.canal === c);
      b.classList.toggle('!text-brand-300', b.dataset.canal === c);
    });
    carregar(true);
  };

  container.querySelectorAll('.canal').forEach((b) => b.addEventListener('click', () => trocarCanal(b.dataset.canal)));

  container.querySelector('#form-msg').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = container.querySelector('#txt');
    const texto = input.value.trim();
    if (!texto) return;
    input.value = '';
    try { await api.chatEnviar(canal, texto); await carregar(true); }
    catch (err) { toast(err.message, 'erro'); input.value = texto; }
  });

  await carregar(true);
  intervalo = setInterval(() => carregar(false), 5000); // polling leve
}

function escapar(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function hora(iso) { const d = new Date(iso); return isNaN(d) ? '' : d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }); }
Object.assign(__M['modules/chat.js'], { render });
})();

}

function listaRecente(itens, resumo) {
  if (!itens || !itens.length) return '<p class="muted text-sm py-4">Nenhum registro recente.</p>';

    </li>`).join('')}
  </ul>`;
}

// ---------------- Clima (Open-Meteo, sem chave) ----------------
async function carregarClima(el) {
  const render = (nome, temp, cod, vento) => {
    el.innerHTML = `
      <div class="flex items-center justify-between mb-1">
        <h3 class="font-display font-semibold">Clima</h3>
        <span class="text-brand-400">${icon('local', 'w-4 h-4')}</span>
      </div>
      <p class="text-xs muted mb-3">${nome}</p>
      <div class="flex items-end gap-2">
        <span class="font-display text-4xl font-bold">${Math.round(temp)}°</span>
        <span class="muted text-sm mb-1">${descricaoTempo(cod)}</span>
      </div>
      <p class="text-xs muted mt-2">Vento: ${vento} km/h</p>`;
  };

  const buscar = async (lat, lon, nome) => {
    try {
      const url = `${CONFIG.CLIMA_API}?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m`;
      const r = await fetch(url);
      const j = await r.json();
      render(nome, j.current.temperature_2m, j.current.weather_code, j.current.wind_speed_10m);
    } catch (e) {
      el.innerHTML = '<h3 class="font-display font-semibold mb-1">Clima</h3><p class="muted text-sm">Indisponível no momento.</p>';
    }
  };

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (p) => buscar(p.coords.latitude, p.coords.longitude, 'Sua localização'),
      () => buscar(CONFIG.MAPA_CENTRO[0], CONFIG.MAPA_CENTRO[1], 'Brasília, DF (padrão)'),
      { timeout: 6000 }
    );
  } else {
    buscar(CONFIG.MAPA_CENTRO[0], CONFIG.MAPA_CENTRO[1], 'Brasília, DF (padrão)');
  }
}

function descricaoTempo(cod) {
  if (cod === 0) return 'Céu limpo';
  if (cod <= 3) return 'Parcialmente nublado';
  if (cod <= 48) return 'Neblina';
  if (cod <= 67) return 'Chuva';
  if (cod <= 77) return 'Neve';
  if (cod <= 82) return 'Pancadas';
  return 'Tempestade';
}

// ---------------- Fase da lua ----------------
function faseLua() {
  const info = calcularFaseLua(new Date());
  return `
    <div class="flex items-center justify-between mb-1">
      <h3 class="font-display font-semibold">Fase da lua</h3>
      <span class="text-brand-400">${icon('lua', 'w-4 h-4')}</span>
    </div>
    <div class="flex items-center gap-3 mt-2">
      <span class="text-4xl">${info.emoji}</span>
      <div>
        <p class="font-medium text-sm">${info.nome}</p>
        <p class="text-xs muted">${info.iluminacao}% iluminada</p>
      </div>
    </div>
    <p class="text-[11px] muted mt-3">Luas mais claras favorecem a atividade noturna do javali.</p>`;
}

function calcularFaseLua(data) {
  const lp = 2551443; // período sinódico em segundos
  const nova = new Date(2000, 0, 6, 18, 14, 0);
  const fase = (((data.getTime() - nova.getTime()) / 1000) % lp) / lp;
  const idade = fase * 29.53;
  const ilum = Math.round((1 - Math.cos(fase * 2 * Math.PI)) / 2 * 100);
  const fases = [
    { max: 1.84, nome: 'Nova', emoji: '🌑' },
    { max: 5.53, nome: 'Crescente côncava', emoji: '🌒' },
    { max: 9.22, nome: 'Quarto crescente', emoji: '🌓' },
    { max: 12.91, nome: 'Crescente gibosa', emoji: '🌔' },
    { max: 16.61, nome: 'Cheia', emoji: '🌕' },
    { max: 20.30, nome: 'Minguante gibosa', emoji: '🌖' },
    { max: 23.99, nome: 'Quarto minguante', emoji: '🌗' },
    { max: 27.68, nome: 'Minguante côncava', emoji: '🌘' },
    { max: 30, nome: 'Nova', emoji: '🌑' }
  ];
  const f = fases.find((x) => idade < x.max) || fases[0];
  return { nome: f.nome, emoji: f.emoji, iluminacao: ilum };
}

(function(){
/** HuntPro Brasil — módulo Mapa Inteligente (Leaflet + OpenStreetMap). */
const { api } = __M['api/index.js'];
const { CONFIG } = __M['config.js'];
const { cabecalhoPagina, spinner, formatarData } = __M['core/ui.js'];
const { icon } = __M['core/icons.js'];
const CAMADAS = [
  { tabela: 'fazendas',    label: 'Fazendas',    cor: '#6b8f5e', emoji: '🌾' },
  { tabela: 'ocorrencias', label: 'Ocorrências', cor: '#e0aa3e', emoji: '⚠️' },
  { tabela: 'capturas',    label: 'Capturas',    cor: '#c0554d', emoji: '🎯' },
  { tabela: 'cameras',     label: 'Câmeras',     cor: '#4d86c0', emoji: '📷' }
];

async function render(container) {
  container.innerHTML = `
    <div class="p-6 md:p-8">
      ${cabecalhoPagina('Mapa Inteligente', 'Fazendas, ocorrências, capturas e câmeras georreferenciadas')}
      <div class="flex flex-wrap gap-2 mb-4">
        ${CAMADAS.map((c) => `
          <label class="flex items-center gap-2 surface border border-app rounded-lg px-3 py-1.5 text-sm cursor-pointer">
            <input type="checkbox" class="camada accent-brand-500" data-camada="${c.tabela}" checked>
            <span style="color:${c.cor}">${c.emoji}</span> ${c.label}
          </label>`).join('')}
      </div>
      <div id="mapa" class="rounded-xl overflow-hidden border border-app" style="height:70vh"></div>
      <p class="muted text-xs mt-2">${icon('local', 'w-3 h-3')} Clique no mapa para copiar coordenadas.</p>
    </div>`;

  if (!window.L) {
    container.querySelector('#mapa').innerHTML =
      '<div class="p-8 text-red-400">Biblioteca de mapa (Leaflet) não carregou. Verifique sua conexão.</div>';
    return;
  }

  const map = L.map('mapa').setView(CONFIG.MAPA_CENTRO, CONFIG.MAPA_ZOOM);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);

  const grupos = {};
  const pontos = [];

  for (const c of CAMADAS) {
    grupos[c.tabela] = L.layerGroup().addTo(map);
    try {
      const registros = await api.list(c.tabela, { limit: 1000 });
      registros.forEach((r) => {
        const lat = parseFloat(String(r.latitude).replace(',', '.'));
        const lng = parseFloat(String(r.longitude).replace(',', '.'));
        if (isNaN(lat) || isNaN(lng)) return;
        pontos.push([lat, lng]);
        const marcador = L.circleMarker([lat, lng], {
          radius: 8, color: c.cor, fillColor: c.cor, fillOpacity: 0.7, weight: 2
        }).bindPopup(popupHtml(c, r));
        grupos[c.tabela].addLayer(marcador);
      });
    } catch (e) { /* camada sem permissão é apenas ignorada */ }
  }

  if (pontos.length) map.fitBounds(pontos, { padding: [40, 40], maxZoom: 12 });

  container.querySelectorAll('.camada').forEach((cb) => {
    cb.addEventListener('change', () => {
      const g = grupos[cb.dataset.camada];
      if (cb.checked) map.addLayer(g); else map.removeLayer(g);
    });
  });

  map.on('click', (e) => {
    const txt = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
    L.popup().setLatLng(e.latlng)
      .setContent(`<b>Coordenadas</b><br>${txt}`).openOn(map);
    navigator.clipboard?.writeText(txt);
  });
}

function popupHtml(camada, r) {
  const linhas = [];
  if (camada.tabela === 'fazendas') {
    linhas.push(`<b>${r.nome || 'Fazenda'}</b>`, r.cidade ? `${r.cidade}/${r.uf}` : '', r.area_ha ? `${r.area_ha} ha` : '');
  } else if (camada.tabela === 'ocorrencias') {
    linhas.push(`<b>${r.tipo || 'Ocorrência'}</b>`, r.gravidade || '', formatarData(r.data));
  } else if (camada.tabela === 'capturas') {
    linhas.push(`<b>Captura</b>`, `${r.quantidade || 0} javali(s)`, r.metodo || '', formatarData(r.data));
  } else if (camada.tabela === 'cameras') {
    linhas.push(`<b>${r.nome || 'Câmera'}</b>`, r.modelo || '', r.status || '');
  }
  return `<div style="font-size:12px;line-height:1.5">${linhas.filter(Boolean).join('<br>')}</div>`;
}
Object.assign(__M['modules/mapa.js'], { render });
})();

    catch (e) { grade.innerHTML = `<div class="text-red-400 py-8">${e.message}</div>`; }
  };

  const renderGrade = () => {
    if (!dados.length) { grade.innerHTML = '<p class="muted py-16 text-center">Nenhum anúncio ainda. Seja o primeiro a anunciar.</p>'; return; }
    grade.innerHTML = `<div class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">

        try { await api.remove('produtos', p.id); toast('Anúncio removido.', 'sucesso'); carregar(); }

  return `<div class="surface border border-app rounded-xl p-5">
    <h3 class="font-display font-semibold mb-3">${titulo}</h3>
    ${entradas.length ? `<ul class="space-y-2">${entradas.map(([k, v]) => `
      <li class="flex justify-between text-sm"><span>${k}</span><span class="font-semibold text-brand-300">${v}</span></li>`).join('')}</ul>`
      : '<p class="muted text-sm">Sem dados.</p>'}
  </div>`;
}

function blocoFazenda(titulo, obj) {
  const entradas = Object.entries(obj || {});
  return `<div class="surface border border-app rounded-xl p-5">
    <h3 class="font-display font-semibold mb-3">${titulo}</h3>
    ${entradas.length ? `<ul class="space-y-2">${entradas.map(([k, v]) => `
      <li class="flex justify-between text-sm"><span class="truncate muted">${k || 'sem fazenda'}</span><span class="font-semibold text-brand-300">${v}</span></li>`).join('')}</ul>`
      : '<p class="muted text-sm">Sem dados.</p>'}
  </div>`;
}

function exportarCSV(linhas) {
  const cols = ['data', 'quantidade', 'peso_total', 'metodo', 'latitude', 'longitude', 'observacoes'];
  const cabecalho = cols.join(';');
  const corpo = linhas.map((l) => cols.map((c) => `"${String(l[c] ?? '').replace(/"/g, '""')}"`).join(';')).join('\n');
  const blob = new Blob(['\uFEFF' + cabecalho + '\n' + corpo], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `huntpro_capturas_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  toast('CSV exportado.', 'sucesso');
}
Object.assign(__M['modules/relatorios.js'], { render });
})();
