<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Novale · Gestão de Cargos e Desempenho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0F22; --bg2:#0C1327; --surface:#131A30; --surface2:#182140;
  --elevated:#1C2748; --border:#28335A; --border-soft:#1B2340;
  --text:#EDF1F8; --muted:#8D99B8; --muted2:#5E6A8E;
  --cyan:#2CA6E0; --cyan-bright:#48C6F7; --cyan-deep:#1B6FA8;
  --glow:rgba(44,166,224,.30); --gold:#E8B54A; --gold-soft:rgba(232,181,74,.14);
  --green:#3DD68C; --green-soft:rgba(61,214,140,.14);
  --red:#F26B84; --red-soft:rgba(242,107,132,.14);
  --amber:#E8B54A;
  --radius:16px; --radius-sm:11px; --radius-lg:22px;
  --shadow:0 18px 50px -18px rgba(0,0,0,.65);
  --ring:0 0 0 3px var(--glow);
  --f-disp:'Sora',system-ui,sans-serif; --f-body:'Inter',system-ui,sans-serif; --f-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--f-body); color:var(--text); background:var(--bg);
  background-image:
    radial-gradient(1100px 600px at 82% -8%, rgba(44,166,224,.16), transparent 60%),
    radial-gradient(900px 520px at -6% 108%, rgba(27,111,168,.14), transparent 55%);
  min-height:100vh; -webkit-font-smoothing:antialiased; line-height:1.5;
}
h1,h2,h3,h4{font-family:var(--f-disp);letter-spacing:-.02em;line-height:1.15}
a{color:var(--cyan-bright);text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:20px}
::-webkit-scrollbar-track{background:transparent}
.mono{font-family:var(--f-mono)}
.hidden{display:none!important}

/* ---------- AUTH SCREENS ---------- */
.auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
.auth-card{
  width:100%;max-width:430px;background:linear-gradient(180deg,var(--surface2),var(--surface));
  border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 36px;
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.auth-card::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;
  background:linear-gradient(135deg,rgba(72,198,247,.5),transparent 40%,transparent 70%,rgba(232,181,74,.28));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.auth-logo{display:block;height:52px;margin:0 auto 26px;object-fit:contain}
.auth-title{text-align:center;font-size:1.35rem;font-weight:700;margin-bottom:6px}
.auth-sub{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:.02em}
.field input,.field textarea,.field select{
  width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;color:var(--text);font-size:.94rem;transition:border-color .15s,box-shadow .15s;
}
.field textarea{resize:vertical;min-height:88px;line-height:1.55}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--cyan);box-shadow:var(--ring)}
.field .hint{font-size:.72rem;color:var(--muted2);margin-top:6px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--radius-sm);
  padding:12px 20px;font-weight:600;font-size:.92rem;transition:transform .12s,filter .15s,background .15s;
}
.btn:active{transform:translateY(1px)}
.btn svg{width:17px;height:17px;flex:none;stroke-width:2}
.btn-sm svg{width:15px;height:15px}
.nav-item{position:relative}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:.7rem;font-weight:800;line-height:1;
  min-width:19px;height:19px;border-radius:10px;display:inline-grid;place-items:center;padding:0 5px;font-family:var(--f-mono)}
.yn{display:inline-flex;gap:6px}
.yn button{padding:6px 15px;border-radius:9px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);
  font-weight:700;font-size:.82rem;transition:.12s;cursor:pointer}
.yn button:hover:not(.on){border-color:var(--cyan);color:var(--text)}
.yn button.sim.on{background:var(--green-soft);border-color:rgba(61,214,140,.5);color:#8FE9BE}
.yn button.nao.on{background:rgba(242,107,132,.12);border-color:rgba(242,107,132,.5);color:#F6A9B8}
.btn-primary{background:linear-gradient(135deg,var(--cyan-bright),var(--cyan-deep));color:#04121F;box-shadow:0 8px 24px -8px var(--glow)}
.btn-primary:hover{filter:brightness(1.07)}
.btn-block{width:100%}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan-bright)}
.btn-gold{background:linear-gradient(135deg,#F0C868,#C99327);color:#231603;box-shadow:0 8px 24px -10px var(--gold-soft)}
.btn-danger{background:var(--red-soft);color:var(--red);border:1px solid rgba(242,107,132,.3)}
.btn-danger:hover{background:rgba(242,107,132,.22)}
.btn-sm{padding:8px 13px;font-size:.82rem;border-radius:9px}
.btn-icon{padding:8px 11px}
.auth-foot{text-align:center;margin-top:22px;font-size:.82rem;color:var(--muted2)}

/* ---------- APP SHELL ---------- */
.shell{display:grid;grid-template-columns:264px 1fr;min-height:100vh}
.sidebar{
  background:linear-gradient(180deg,var(--bg2),var(--bg));border-right:1px solid var(--border-soft);
  padding:26px 18px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh;
}
.side-logo{height:58px;object-fit:contain;object-position:left;margin:2px 4px 24px}
.nav-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted2);margin:16px 10px 6px;font-weight:700}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;color:var(--muted);
  font-size:.9rem;font-weight:500;border:1px solid transparent;transition:.15s;cursor:pointer;
}
.nav-item svg{width:19px;height:19px;flex:none;stroke-width:1.9}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(44,166,224,.16),rgba(44,166,224,.04));color:var(--cyan-bright);border-color:rgba(44,166,224,.3)}
.side-foot{margin-top:auto;border-top:1px solid var(--border-soft);padding-top:16px}
.user-row{display:flex;align-items:center;gap:8px}
.user-chip{flex:1;min-width:0;display:flex;align-items:center;gap:11px;padding:7px 9px;border-radius:11px;
  background:transparent;border:1px solid transparent;cursor:pointer;text-align:left;transition:.15s;
  color:var(--text);font-family:inherit}
.user-chip .nm{color:var(--text)}
.user-chip:hover{background:var(--surface);border-color:var(--border-soft)}
.avatar{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));overflow:hidden;
  display:grid;place-items:center;font-weight:700;color:#06121D;font-family:var(--f-disp);flex:none}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
.user-chip .nm{font-size:.85rem;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-chip .rl{font-size:.72rem;color:var(--muted2);text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logout-btn{width:34px;height:34px;flex:none;border-radius:10px;border:1px solid var(--border-soft);background:var(--surface);
  color:var(--muted);display:grid;place-items:center;cursor:pointer;transition:.15s}
.logout-btn:hover{color:var(--red);border-color:rgba(242,107,132,.45);background:rgba(242,107,132,.08)}
.logout-btn svg{width:17px;height:17px;stroke-width:1.9}
.main{padding:32px 40px 60px;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.page-title{font-size:1.6rem;font-weight:700}
.page-sub{color:var(--muted);font-size:.9rem;margin-top:3px}

/* ---------- CARDS / GRID ---------- */
.grid{display:grid;gap:18px}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
.card{background:linear-gradient(180deg,var(--surface2),var(--surface));border:1px solid var(--border-soft);
  border-radius:var(--radius);padding:22px;box-shadow:0 8px 30px -20px rgba(0,0,0,.6)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.card-h h3{font-size:1.05rem;font-weight:600}
.stat{position:relative;overflow:hidden}
.stat .k{font-family:var(--f-mono);font-size:2.1rem;font-weight:700;letter-spacing:-.03em}
.stat .lbl{color:var(--muted);font-size:.82rem;margin-top:2px}
.stat .ic{position:absolute;top:18px;right:18px;width:40px;height:40px;border-radius:12px;display:grid;place-items:center;
  background:rgba(44,166,224,.12);color:var(--cyan-bright)}
.stat .ic svg{width:21px;height:21px;stroke-width:1.9}
.stat.gold .ic{background:var(--gold-soft);color:var(--gold)}
.stat.green .ic{background:var(--green-soft);color:var(--green)}

/* ---------- TABLE / LIST ---------- */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);
  font-weight:700;padding:0 14px 12px}
.tbl td{padding:14px;border-top:1px solid var(--border-soft);font-size:.9rem;vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.015)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;font-size:.74rem;font-weight:600}
.pill.cyan{background:rgba(44,166,224,.14);color:var(--cyan-bright)}
.pill.gold{background:var(--gold-soft);color:var(--gold)}
.pill.green{background:var(--green-soft);color:var(--green)}
.pill.gray{background:rgba(141,153,184,.14);color:var(--muted)}
.pill.amber{background:rgba(232,181,74,.14);color:var(--amber)}
.pill.red{background:var(--red-soft);color:var(--red)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.row-actions{display:flex;gap:7px;justify-content:flex-end}
.empty{text-align:center;padding:46px 20px;color:var(--muted2)}
.empty svg{width:44px;height:44px;stroke-width:1.5;opacity:.5;margin-bottom:12px}
.empty p{font-size:.92rem}

/* list of item-cards */
.item-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:18px 20px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:16px;transition:.15s}
.item-card:hover{border-color:var(--border)}
.item-card .meta{font-size:.8rem;color:var(--muted);margin-top:4px;display:flex;gap:14px;flex-wrap:wrap}
.item-card h4{font-size:1rem;font-weight:600}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(4,8,18,.72);backdrop-filter:blur(4px);z-index:60;
  display:grid;place-items:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .18s}
.overlay.open{opacity:1;pointer-events:auto}
.modal{width:100%;max-width:560px;max-height:88vh;overflow:auto;background:linear-gradient(180deg,var(--surface2),var(--surface));
  border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);
  transform:translateY(12px) scale(.98);transition:transform .2s}
.overlay.open .modal{transform:none}
.modal.wide{max-width:820px}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:22px 26px;border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:var(--surface2);z-index:2}
.modal-h h3{font-size:1.15rem}
.modal-b{padding:24px 26px}
.modal-f{padding:18px 26px;border-top:1px solid var(--border-soft);display:flex;gap:12px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface)}
.x-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:9px;display:grid;place-items:center}
.x-btn:hover{color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
fieldset{border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:16px;margin-top:6px}
fieldset legend{font-size:.76rem;font-weight:700;color:var(--cyan-bright);padding:0 8px;text-transform:uppercase;letter-spacing:.05em}

/* ---------- TOAST ---------- */
#toasts{position:fixed;top:20px;right:20px;z-index:90;display:flex;flex-direction:column;gap:10px}
.toast{min-width:260px;max-width:360px;background:var(--elevated);border:1px solid var(--border);border-left:3px solid var(--cyan);
  border-radius:11px;padding:13px 16px;font-size:.88rem;box-shadow:var(--shadow);animation:slidein .22s ease;display:flex;gap:11px;align-items:flex-start}
.toast.err{border-left-color:var(--red)}
.toast.ok{border-left-color:var(--green)}
.toast svg{width:18px;height:18px;flex:none;margin-top:1px}
@keyframes slidein{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}

/* ---------- RADAR ---------- */
.radar-wrap{display:flex;gap:24px;flex-wrap:wrap;align-items:center;justify-content:center}
.radar-legend{display:flex;flex-direction:column;gap:10px}
.legend-item{display:flex;align-items:center;gap:9px;font-size:.85rem}
.legend-swatch{width:13px;height:13px;border-radius:4px}

/* ---------- SCALE INPUT ---------- */
.scale{display:flex;gap:5px}
.scale button{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--bg2);
  color:var(--muted);font-weight:700;font-family:var(--f-mono);font-size:.9rem;transition:.12s}
.scale button:hover:not([disabled]):not(.on){border-color:var(--cyan);color:var(--text)}
.scale button.on{background:linear-gradient(135deg,var(--cyan-bright),var(--cyan-deep));color:#06121D;border-color:transparent}
.scale button.n0.on{background:linear-gradient(135deg,#F26B84,#c1435e);color:#fff}
.scale button[disabled]{opacity:.55;cursor:default}
.comp-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:13px 0;border-bottom:1px solid var(--border-soft)}
.comp-row:last-child{border-bottom:none}
.comp-row .cn{font-size:.92rem;font-weight:500}
.comp-row .cn small{display:block;color:var(--muted2);font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.wbadge{display:inline-block;background:rgba(44,166,224,.13);color:var(--cyan-bright);border:1px solid rgba(44,166,224,.25);
  font-family:var(--f-mono);font-weight:700;font-size:.68rem;padding:2px 7px;border-radius:6px;margin-left:8px;vertical-align:middle}
.scale-hint{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted2);margin:2px 2px 12px}
.block-title{font-size:.74rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted2);font-weight:700;margin:20px 0 4px}
.meta-goal{font-size:.9rem;font-weight:500;line-height:1.45}
/* ---------- SCORE / RESULTADO ---------- */
.score-wrap{display:flex;align-items:center;gap:18px;padding:16px 18px;border-radius:14px;background:var(--surface);border:1px solid var(--border-soft);margin-bottom:16px}
.score-num{font-family:var(--f-mono);font-weight:700;font-size:2.1rem;line-height:1}
.score-num small{font-size:1rem;color:var(--muted2);font-weight:600}
.score-meta{flex:1}
.score-track{height:9px;border-radius:20px;background:var(--bg2);overflow:hidden;margin-top:9px;position:relative}
.score-track > span{display:block;height:100%;border-radius:20px;transition:width .5s}
.score-track .tick{position:absolute;top:-3px;width:2px;height:15px;background:var(--muted2);opacity:.5}
.result-band{border-radius:12px;padding:13px 16px;display:flex;gap:11px;align-items:center;font-size:.9rem;font-weight:600;margin-bottom:16px}
.result-band svg{width:20px;height:20px;flex:none}
.result-apto{background:var(--green-soft);border:1px solid rgba(61,214,140,.35);color:#8FE9BE}
.result-apto svg{color:var(--green)}
.result-desenvolvimento{background:var(--gold-soft);border:1px solid rgba(232,181,74,.3);color:#F1D89A}
.result-desenvolvimento svg{color:var(--gold)}
.result-manter{background:rgba(242,107,132,.1);border:1px solid rgba(242,107,132,.3);color:#F6A9B8}
.result-manter svg{color:var(--red)}
.ref-list{display:flex;flex-direction:column;gap:12px}
.ref-list .k{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);font-weight:700;margin-bottom:3px}
.ref-list .v{font-size:.88rem;line-height:1.55;white-space:pre-wrap;color:var(--muted)}

/* ---------- MISC ---------- */
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.center-load{min-height:100vh;display:grid;place-items:center;gap:16px;text-align:center}
.big-money{font-family:var(--f-mono);font-weight:700;font-size:1.5rem;color:var(--gold)}
.kv{display:flex;flex-direction:column;gap:14px}
.kv .k{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);font-weight:700;margin-bottom:4px}
.kv .v{font-size:.94rem;line-height:1.6;white-space:pre-wrap}
.chip-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.tag{background:rgba(44,166,224,.1);border:1px solid rgba(44,166,224,.22);color:var(--cyan-bright);
  padding:5px 11px;border-radius:8px;font-size:.8rem;font-weight:500}
.progress{height:8px;background:var(--bg2);border-radius:20px;overflow:hidden;margin-top:8px}
.progress > span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-deep),var(--cyan-bright));border-radius:20px}
.section-gap{margin-top:26px}
.inline-note{background:var(--gold-soft);border:1px solid rgba(232,181,74,.25);border-radius:11px;padding:12px 15px;font-size:.84rem;color:#F1D89A;display:flex;gap:10px;align-items:flex-start}
.inline-note svg{width:18px;height:18px;flex:none;color:var(--gold);margin-top:1px}
.steps{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.step{flex:1;min-width:140px;padding:12px 14px;border-radius:11px;background:var(--surface);border:1px solid var(--border-soft);font-size:.82rem}
.step.done{border-color:rgba(61,214,140,.35);background:var(--green-soft)}
.step.current{border-color:var(--cyan);background:rgba(44,166,224,.1)}
.step .sn{font-family:var(--f-mono);font-weight:700;font-size:.72rem;color:var(--muted2)}
.step.done .sn{color:var(--green)} .step.current .sn{color:var(--cyan-bright)}
.step .st{font-weight:600;margin-top:3px}

@media(max-width:900px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-280px;z-index:70;transition:left .25s;box-shadow:var(--shadow)}
  .sidebar.open{left:0}
  .main{padding:20px}
  .cols-2,.cols-3,.cols-4{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .menu-toggle{display:grid!important}
}
.menu-toggle{display:none;width:42px;height:42px;border-radius:11px;background:var(--surface);border:1px solid var(--border);place-items:center;color:var(--text)}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:65;display:none}
.scrim.on{display:block}

/* organograma */
.org-tree{overflow-x:auto;padding:6px 2px 28px}
.org-tree ul{display:flex;justify-content:center;padding-top:20px;position:relative;margin:0;list-style:none}
.org-tree li{position:relative;padding:20px 9px 0;display:flex;flex-direction:column;align-items:center}
.org-tree li::before,.org-tree li::after{content:'';position:absolute;top:0;right:50%;width:50%;height:20px;border-top:2px solid rgba(72,198,247,.30)}
.org-tree li::after{right:auto;left:50%;border-left:2px solid rgba(72,198,247,.30)}
.org-tree li::before{border-right:2px solid rgba(72,198,247,.30)}
.org-tree li:only-child::before,.org-tree li:only-child::after{display:none}
.org-tree li:first-child::before,.org-tree li:last-child::after{border:0}
.org-tree li:last-child::before{border-right:2px solid rgba(72,198,247,.30)}
.org-tree li:first-child::after{border-left:2px solid rgba(72,198,247,.30)}
.org-tree ul ul::before{content:'';position:absolute;top:0;left:50%;height:20px;border-left:2px solid rgba(72,198,247,.30)}
.org-tree>ul{display:inline-flex;min-width:100%;box-sizing:border-box;padding:0 32px}
.org-tree>ul>li{padding-top:0}
.org-tree>ul>li::before,.org-tree>ul>li::after{display:none}
.org-card{position:relative;background:var(--card2,#182140);border:1px solid rgba(255,255,255,.09);border-radius:12px;
  padding:11px 13px;width:214px;height:96px;box-sizing:border-box;overflow:hidden;cursor:pointer;
  box-shadow:0 5px 14px rgba(0,0,0,.24);transition:border-color .15s,transform .15s}
.org-card:hover{border-color:rgba(72,198,247,.45);transform:translateY(-1px)}
.org-card-h{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;font-family:'Sora',system-ui,sans-serif;font-weight:600;font-size:.95rem;line-height:1.2}
.org-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.org-resp{color:var(--muted,#8D99B8);font-size:.8rem;margin-top:5px;display:flex;align-items:center;gap:6px;min-width:0}
.org-resp span.n{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.org-resp svg{width:13px;height:13px;flex:none}
.org-meta{margin-top:8px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.org-actions{position:absolute;left:8px;right:8px;bottom:8px;display:none;gap:5px;flex-wrap:wrap;justify-content:center;background:rgba(16,23,48,.97);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:6px;box-shadow:0 6px 16px rgba(0,0,0,.4)}
.org-card:hover .org-actions{display:flex}
.org-actions .btn{padding:4px 6px}
.org-actions .btn svg{width:15px;height:15px}
.org-card .pill{font-size:.7rem;padding:2px 8px}
.org-toggle{flex:none;width:24px;height:24px;border-radius:50%;border:1px solid rgba(72,198,247,.5);background:rgba(72,198,247,.12);color:#48C6F7;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
.org-toggle:hover{background:rgba(72,198,247,.22)}
.org-toggle svg{width:13px;height:13px;transition:transform .15s}
.org-toggle.closed svg{transform:rotate(-90deg)}
.org-people{cursor:pointer;font:inherit;display:inline-flex;align-items:center}
.org-people:hover{filter:brightness(1.25)}
.pick-search{width:100%;margin-bottom:8px}
/* ---- aniversariante do dia: confetes e fogos ---- */
.bday-card{position:relative;overflow:hidden;border-radius:18px;padding:26px 22px;text-align:center;
  background:linear-gradient(150deg,rgba(44,166,224,.20),rgba(232,181,74,.16));border:1px solid rgba(232,181,74,.42)}
.bday-card .conteudo{position:relative;z-index:3}
.bday-nome{font-family:var(--f-disp);font-size:1.5rem;font-weight:700;margin:12px 0 3px}
.bday-sub{color:var(--muted);font-size:.9rem}
.bday-parabens{display:inline-block;margin-bottom:6px;font-family:var(--f-disp);font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;font-size:.78rem;color:var(--gold)}
.bday-foto{width:96px;height:96px;border-radius:50%;margin:0 auto;overflow:hidden;border:3px solid rgba(232,181,74,.6);
  display:grid;place-items:center;background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));color:#06121D;
  font-family:var(--f-disp);font-weight:700;font-size:2rem}
.bday-foto img{width:100%;height:100%;object-fit:cover}
.confete{position:absolute;top:-14px;width:9px;height:14px;opacity:0;border-radius:2px;z-index:1;
  animation:cai linear infinite}
@keyframes cai{
  0%{transform:translateY(-20px) rotate(0deg);opacity:0}
  8%{opacity:1}
  100%{transform:translateY(420px) rotate(720deg);opacity:0}}
.fogo{position:absolute;width:6px;height:6px;border-radius:50%;z-index:2;opacity:0;animation:estoura ease-out infinite}
@keyframes estoura{
  0%{transform:translate(0,0) scale(.4);opacity:0}
  12%{opacity:1}
  70%{opacity:.85}
  100%{transform:translate(var(--dx),var(--dy)) scale(.2);opacity:0}}
@media (prefers-reduced-motion: reduce){ .confete,.fogo{display:none} }
.pick-count{margin-top:7px;font-size:.78rem;color:var(--muted2)}
.pick-list{max-height:260px;overflow:auto;border:1px solid var(--border-soft);border-radius:11px;padding:6px}
.pick-item{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:9px;cursor:pointer}
.pick-item:hover{background:var(--surface)}
.pick-item input{width:17px;height:17px;accent-color:var(--cyan);flex:none;cursor:pointer}
.pick-empty{padding:14px;text-align:center}
</style>

const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },

  del(k){ try{ localStorage.removeItem(k); }catch(e){} }
};

/* ---------- API ---------- */
async function api(action, payload={}){
  const body = Object.assign({ action, token:S.token }, payload);
  let res;
  try{
    res = await fetch(API_URL, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
      },
      body: JSON.stringify(body)
    });
  }catch(e){
    throw new Error('O navegador não conseguiu falar com a API. As causas mais comuns são: '
      + '(1) a Edge Function "api" ainda não foi publicada; '
      + '(2) ela foi publicada exigindo JWT — republique com --no-verify-jwt; '
      + '(3) o endereço do projeto está errado. Use o botão "Diagnosticar" para identificar.');
  }
  const texto = await res.text();
  let json;
  try{ json = JSON.parse(texto); }
  catch(e){
    if(res.status===401 || res.status===403) throw new Error('A API recusou a chamada (HTTP '+res.status+'). Republique a função com --no-verify-jwt ou confira a chave anon.');
    if(res.status===404) throw new Error('Função "api" não encontrada (HTTP 404). Confirme o nome da função e o endereço do projeto.');
    throw new Error('Resposta inesperada do servidor (HTTP '+res.status+'): '+texto.slice(0,180));
  }
  if(json.ok === undefined && (res.status<200 || res.status>=300))
    throw new Error('Erro HTTP '+res.status+': '+(json.message || json.error || texto.slice(0,180)));
  if(!json.ok) throw new Error(json.erro || json.message || 'Erro desconhecido.');
  return json.data;
}

/* ---------- utils ---------- */
const $ = (s,el=document)=>el.querySelector(s);
const el = id => document.getElementById(id);
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(n){ return String(n||'?').trim().split(/\s+/).slice(0,2).map(x=>x[0]||'').join('').toUpperCase(); }
function money(v){ return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso); return isNaN(d)?'—':d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function fmtDay(iso){ if(!iso) return '—'; const d=new Date(iso); return isNaN(d)?esc(iso):d.toLocaleDateString('pt-BR'); }

function toast(msg,type=''){
  const t=document.createElement('div'); t.className='toast '+type;
  const ic = type==='err'?ICON.alert:type==='ok'?ICON.check:ICON.info;
  t.innerHTML=`${ic}<span>${esc(msg)}</span>`;
  el('toasts').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, type==='err'?5200:3400);
}

/* Testa cada etapa da conexão e devolve um relatório legível. */
async function novaleDiagnostico(){
  const out=[];
  out.push((CONFIG_PENDENTE?'✗':'✓')+' Configuração: '+(CONFIG_PENDENTE
    ? 'preencha SUPABASE_URL e SUPABASE_ANON_KEY no topo do index.html'
    : SB_BASE));
  if(CONFIG_PENDENTE) return out;

  // a) o projeto responde? (isola "endereço/chave errados")
  try{
    const r = await fetch(SB_BASE + '/rest/v1/', { headers:{ apikey: SUPABASE_ANON_KEY } });
    out.push(r.status===200 || r.status===404
      ? '✓ Projeto Supabase acessível'
      : '✗ Projeto respondeu HTTP '+r.status+' — confira a chave anon');
  }catch(e){
    out.push('✗ Não foi possível acessar '+SB_BASE+' — endereço do projeto errado ou sem internet');
    return out;
  }

  // b) a função existe e responde?
  try{
    const r = await fetch(API_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', apikey: SUPABASE_ANON_KEY, 'Authorization':'Bearer '+SUPABASE_ANON_KEY },
      body: JSON.stringify({ action:'status' })
    });
    const t = await r.text();
    if(r.status===404) out.push('✗ Função "api" não encontrada (404). Publique: supabase functions deploy api --no-verify-jwt');
    else if(r.status===401 || r.status===403) out.push('✗ Função exige JWT (HTTP '+r.status+'). Republique com --no-verify-jwt');
    else if(r.ok && t.indexOf('"ok"')>=0) out.push('✓ Edge Function "api" respondendo');
    else out.push('✗ Função respondeu HTTP '+r.status+': '+t.slice(0,150));
  }catch(e){
    out.push('✗ Chamada à função bloqueada (CORS/preflight). Normalmente significa que a função não foi publicada, ou foi publicada exigindo JWT.');
  }
  return out;
}

function resizeImage(file,max){
  return new Promise((resolve,reject)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{ URL.revokeObjectURL(url);
      let w=img.width,h=img.height; const scale=Math.min(1,(max||256)/Math.max(w,h)); w=Math.round(w*scale); h=Math.round(h*scale);
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.82, out=cv.toDataURL('image/jpeg',q);
      while(out.length>44000 && q>0.4){ q-=0.12; out=cv.toDataURL('image/jpeg',q); }
      resolve(out);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('Falha ao ler imagem')); };
    img.src=url;
  });
}

const MESES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
function confetesHtml(qtd){
  const cores=['#2CA6E0','#E8B54A','#3DD68C','#F26B84','#48C6F7','#FFFFFF'];
  let h='';
  for(let i=0;i<qtd;i++){
    const c=cores[i%cores.length], esq=Math.round(Math.random()*100), dur=(2.6+Math.random()*2.4).toFixed(2), atraso=(Math.random()*3.2).toFixed(2), larg=6+Math.round(Math.random()*6);
    h+=`<span class="confete" style="left:${esq}%;width:${larg}px;height:${larg+5}px;background:${c};animation-duration:${dur}s;animation-delay:${atraso}s"></span>`;
  }
  return h;
}
function fogosHtml(explosoes){
  const cores=['#E8B54A','#48C6F7','#3DD68C','#F26B84','#FFFFFF'];
  let h='';
  for(let e=0;e<explosoes;e++){
    const cx=12+Math.round(Math.random()*76), cy=10+Math.round(Math.random()*45), atraso=(e*0.7+Math.random()*0.6).toFixed(2), cor=cores[e%cores.length];
    for(let i=0;i<14;i++){
      const ang=(Math.PI*2*i)/14, raio=34+Math.random()*30;
      h+=`<span class="fogo" style="left:${cx}%;top:${cy}%;background:${cor};box-shadow:0 0 7px ${cor};
        --dx:${(Math.cos(ang)*raio).toFixed(1)}px;--dy:${(Math.sin(ang)*raio).toFixed(1)}px;
        animation-duration:1.5s;animation-delay:${atraso}s"></span>`;
    }
  }
  return h;
}

VIEWS.organograma = async function(){
  const areas = await api('listarAreas').then(r=>r.areas);
  S.cache.areas = areas;
  const roots = ordNome(areas.filter(a=>!a.paiId));
  const temSubs = areas.some(a=>areas.some(x=>x.paiId===a.id));
  const acaoAdmin = (S.user.perfil==='admin') ? `<button class="btn btn-primary" onclick="modalNovaArea('','')">${ICON.plus}<span>Nova área / Empresa</span></button>` : '';
  const acoes = (roots.length&&temSubs?`<button class="btn btn-ghost" onclick="expandAllOrg()">Expandir tudo</button><button class="btn btn-ghost" onclick="collapseAllOrg()">Recolher tudo</button>`:'') + acaoAdmin;
  setHead('Organograma','Clique em uma área para ver os detalhes · use os botões ⌄ para abrir ou agrupar cada ramo', acoes);
  if(!roots.length){
    if(S.user.perfil==='admin') return el('content').innerHTML = emptyState('Monte sua empresa','Crie a Empresa (o topo do organograma) e o responsável por ela.','Criar Empresa',"modalNovaArea('','')");
    return el('content').innerHTML = emptyState('Organograma em construção','A estrutura ainda não foi criada pelo administrador.','','');
  }
  if(!S.cache.orgCollapsed){ // padrão: raiz aberta, ramos abaixo agrupados
    S.cache.orgCollapsed = new Set(areas.filter(a=>a.paiId && areas.some(x=>x.paiId===a.id)).map(a=>a.id));
  }
  renderOrg();
};
function renderOrg(){
  const areas=S.cache.areas||[]; const roots=ordNome(areas.filter(a=>!a.paiId));
  el('content').innerHTML = `<div class="org-tree"><ul>${roots.map(r=>orgNode(r,areas)).join('')}</ul></div>`;
}
function toggleOrg(id){ const s=S.cache.orgCollapsed||(S.cache.orgCollapsed=new Set()); if(s.has(id)) s.delete(id); else s.add(id); renderOrg(); }
function expandAllOrg(){ S.cache.orgCollapsed=new Set(); renderOrg(); }
function collapseAllOrg(){ const areas=S.cache.areas||[]; S.cache.orgCollapsed=new Set(areas.filter(a=>areas.some(x=>x.paiId===a.id)).map(a=>a.id)); renderOrg(); }
function orgPodeGerir(a){ return S.user.perfil==='admin' || String(a.responsavelId)===String(S.user.id); }
function orgPodeAddPessoa(a){ return orgPodeGerir(a) || orgCanTransfer(a); }
function orgNode(a, areas){
  const filhos = ordNome(areas.filter(x=>x.paiId===a.id));
  const collapsed = !!(S.cache.orgCollapsed && S.cache.orgCollapsed.has(a.id));
  return `<li>
    <div class="org-card" title="Clique para ver os detalhes" onclick='verArea("${a.id}")'>
      <div class="org-card-h"><span class="org-name">${esc(a.nome)}</span>${filhos.length?`<button class="org-toggle ${collapsed?'closed':''}" title="${collapsed?('Abrir '+filhos.length+' área(s) abaixo'):'Agrupar'}" onclick="event.stopPropagation();toggleOrg('${a.id}')">${ICON.chevron}</button>`:''}</div>
      <div class="org-resp">${ICON.users}<span class="n">${a.responsavelNome?esc(a.responsavelNome):'<span style="color:var(--red)">sem responsável</span>'}</span></div>
      <div class="org-meta">${a.paiId?'':'<span class="pill gold">Empresa</span>'}<button class="pill cyan org-people" title="Ver pessoas da área" onclick='event.stopPropagation();verMembros("${a.id}","${esc(a.nome)}")'><span class="dot"></span>${a.qtdMembros}</button>${(collapsed&&filhos.length)?`<span class="pill gold">+${filhos.length}</span>`:''}</div>
    </div>
    ${(filhos.length && !collapsed)?`<ul>${filhos.map(c=>orgNode(c,areas)).join('')}</ul>`:''}
  </li>`;
}
/* ---------- ordenação e busca ---------- */
function semAcento(t){ return String(t||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); }
function porNome(a,b){ return String((a&&a.nome)||'').localeCompare(String((b&&b.nome)||''),'pt-BR',{sensitivity:'base'}); }
function ordNome(lista){ return (lista||[]).slice().sort(porNome); }

/* lista de seleção MÚLTIPLA com busca */
function pickList(id, pessoas){
  pessoas = ordNome(pessoas);
  if(!pessoas.length) return `<div class="pick-list"><div class="pick-empty page-sub">Ninguém disponível no momento.</div></div>`;
  return `<input class="pick-search" id="${id}_q" placeholder="Buscar pelo nome…" autocomplete="off" oninput="pickFiltrar('${id}')"/>
  <div class="pick-list" id="${id}">${pessoas.map(u=>`
    <label class="pick-item" data-busca="${esc(semAcento(u.nome+' '+(u.login||'')+' '+(u.cargoNome||'')))}">
      <input type="checkbox" value="${u.id}" onchange="pickContar('${id}')"/>
      <span style="min-width:0"><b>${esc(u.nome)}</b><br><span class="page-sub mono" style="font-size:.74rem">@${esc(u.login)}${u.cargoNome?' · '+esc(u.cargoNome):''}</span></span>
    </label>`).join('')}
    <div class="pick-empty page-sub" id="${id}_none" style="display:none">Nenhuma pessoa encontrada com esse nome.</div>
  </div>
  <div class="pick-count" id="${id}_c">Nenhuma pessoa marcada</div>`;
}
function pickFiltrar(id){
  const q=semAcento((el(id+'_q')||{}).value||''); let vis=0;
  [...el(id).querySelectorAll('.pick-item')].forEach(it=>{
    const bate = !q || (it.dataset.busca||'').indexOf(q)>=0;
    it.style.display = bate ? 'flex' : 'none'; if(bate) vis++;
  });
  const vazio=el(id+'_none'); if(vazio) vazio.style.display = vis? 'none':'block';
}
function pickContar(id){
  const n=pickSelecionados(id).length; const c=el(id+'_c');
  if(c) c.textContent = n===0 ? 'Nenhuma pessoa marcada' : (n===1 ? '1 pessoa marcada' : n+' pessoas marcadas');
}
function pickSelecionados(id){
  const box=el(id); if(!box) return [];
  return [...box.querySelectorAll('input:checked')].map(i=>i.value);
}

/* busca instantânea em tabelas: filtra as linhas conforme se digita */
function barraBusca(id, placeholder){
  return `<div style="margin-bottom:12px"><input class="pick-search" id="${id}" placeholder="${esc(placeholder)}" autocomplete="off" oninput="filtrarTabela('${id}')"/></div>`;
}
function filtrarTabela(id){
  const campo=el(id), corpo=el(id+'_tb'); if(!campo||!corpo) return;
  const q=semAcento(campo.value); let vis=0;
  [...corpo.querySelectorAll('tr')].forEach(tr=>{
    const bate = !q || semAcento(tr.textContent).indexOf(q)>=0;
    tr.style.display = bate ? '' : 'none'; if(bate) vis++;
  });
  const vazio=el(id+'_vazio'); if(vazio) vazio.style.display = vis ? 'none' : 'block';
}

  pessoas = ordNome(pessoas);
  if(!pessoas.length) return `<div class="pick-list"><div class="pick-empty page-sub">Nenhuma pessoa disponível.</div></div>`;
  return `<input class="pick-search" id="${id}_q" placeholder="Buscar pelo nome…" autocomplete="off" oninput="pickFiltrar('${id}')"/>
  <div class="pick-list" id="${id}">${pessoas.map(u=>`
    <label class="pick-item" data-busca="${esc(semAcento(u.nome+' '+(u.login||'')))}">
      <input type="radio" name="${id}_r" value="${u.id}" ${String(u.id)===String(selecionadoId||'')?'checked':''}/>
      <span style="min-width:0"><b>${esc(u.nome)}</b>${u.login?`<br><span class="page-sub mono" style="font-size:.74rem">@${esc(u.login)}</span>`:''}</span>
    </label>`).join('')}
    <div class="pick-empty page-sub" id="${id}_none" style="display:none">Nenhuma pessoa encontrada com esse nome.</div>

function pickUm(id){
  const box=el(id); if(!box) return '';
  const m=box.querySelector('input:checked'); return m?m.value:'';
}
async function verArea(id){
  const areas=S.cache.areas||[]; const a=areas.find(x=>String(x.id)===String(id)); if(!a) return;
  const pai=a.paiId?areas.find(x=>String(x.id)===String(a.paiId)):null;
  const filhos=ordNome(areas.filter(x=>String(x.paiId)===String(a.id)));
  const gerir=orgPodeGerir(a), transf=orgCanTransfer(a), addp=orgPodeAddPessoa(a);
  const aj=JSON.stringify(a).replace(/'/g,"&#39;");
  let r={membros:[],avaliadorNome:'',responsavelNome:a.responsavelNome};
  try{ r=await api('membrosArea',{areaId:a.id}); }catch(e){}
  const linha=(k,v)=>`<div style="display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--border-soft)">
    <div style="min-width:140px;color:var(--muted2);font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding-top:2px">${k}</div>
    <div style="flex:1;min-width:0">${v}</div></div>`;
  const membros=r.membros||[];
  const podeGerir = gerir || transf;
  const listaPessoas = membros.length
    ? `<div style="display:flex;flex-direction:column;gap:7px">${membros.map(c=>`<div style="display:flex;align-items:center;gap:9px">
        ${avatarHtml(c,28)}<div style="min-width:0;flex:1"><b>${esc(c.nome)}</b> ${c.ehResponsavel?'<span class="pill gold">Responsável</span>':''}
        <br><span class="page-sub mono" style="font-size:.74rem">@${esc(c.login)}${c.cargoNome?' · '+esc(c.cargoNome):''}</span></div>
        ${(podeGerir && !c.ehResponsavel)?`<button class="btn btn-ghost btn-sm" title="Tirar desta área e deixar disponível" onclick="liberarPessoa('${c.id}','${esc(c.nome)}',()=>{closeModal();verArea('${a.id}');})">Remover da área</button>`:''}
        </div>`).join('')}</div>
        ${podeGerir?'<div class="hint" style="margin-top:8px">Ao remover, a pessoa volta para o banco de disponíveis e pode ser adicionada a outra área.</div>':''}`
    : '<span class="page-sub">Nenhuma pessoa nesta área ainda.</span>';
  const acoes = [];
  if(gerir) acoes.push(`<button class="btn btn-ghost btn-sm" onclick='closeModal();modalNovaArea("${a.id}","${esc(a.nome)}")'>${ICON.plus}<span>Subárea</span></button>`);
  if(addp)  acoes.push(`<button class="btn btn-ghost btn-sm" onclick='closeModal();modalAddPessoa("${a.id}","${esc(a.nome)}")'>${ICON.users}<span>Pessoa</span></button>`);
  if(gerir) acoes.push(`<button class="btn btn-ghost btn-sm" onclick='closeModal();modalEditarArea(${aj})'>${ICON.edit}<span>Editar</span></button>`);
  if(transf&&a.paiId) acoes.push(`<button class="btn btn-ghost btn-sm" onclick='closeModal();modalMoverArea(${aj})'>${ICON.move}<span>Transferir</span></button>`);
  if(gerir&&a.paiId) acoes.push(`<button class="btn btn-danger btn-sm" onclick='closeModal();excluirArea("${a.id}","${esc(a.nome)}")'>${ICON.trash}<span>Excluir</span></button>`);
  modal({wide:true, title:a.nome, body:
      linha('Área', `<b>${esc(a.nome)}</b> ${a.paiId?'':'<span class="pill gold">Empresa</span>'}`)
    + (a.descricao?linha('Descrição', esc(a.descricao)):'')
    + linha('Responsável', a.responsavelNome?esc(a.responsavelNome):'<span style="color:var(--red)">sem responsável</span>')
    + (r.avaliadorNome && r.avaliadorNome!==r.responsavelNome ? linha('Quem avalia', esc(r.avaliadorNome)+' <span class="page-sub">(responsável acima)</span>') : '')
    + linha('Responde a', pai?esc(pai.nome):'<span class="page-sub">nível mais alto da empresa</span>')
    + linha('Áreas abaixo', filhos.length?filhos.map(f=>`<span class="pill cyan" style="margin:0 5px 5px 0;display:inline-block">${esc(f.nome)}</span>`).join(''):'<span class="page-sub">nenhuma</span>')
    + linha('Pessoas ('+membros.length+')', listaPessoas)
    + (acoes.length?`<div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:16px">${acoes.join('')}</div>`:'')
  });
}
function orgCanTransfer(a){
  if(S.user.perfil==='admin') return true;
  const areas=S.cache.areas||[]; let cur=a.paiId?areas.find(x=>x.id===a.paiId):null; let g=0;
  while(cur&&g++<100){ if(String(cur.responsavelId)===String(S.user.id)) return true; cur=cur.paiId?areas.find(x=>x.id===cur.paiId):null; }
  return false;
}
function descendentesIds(id, areas){ const res=[String(id)]; const stack=[String(id)]; while(stack.length){ const c=stack.pop(); areas.forEach(x=>{ if(String(x.paiId)===String(c)){ res.push(String(x.id)); stack.push(String(x.id)); } }); } return res; }
function modalMoverArea(a){
  const areas=S.cache.areas||[];
  const bloq=new Set(descendentesIds(a.id, areas));
  const destinos=areas.filter(x=>!bloq.has(String(x.id)) && String(x.id)!==String(a.paiId));
  if(!destinos.length){ return modal({title:'Transferir área', body:`<div class="inline-note">${ICON.info}<span>Não há outra área disponível como destino.</span></div>`, footer:`<button class="btn btn-primary" onclick="closeModal()">Entendi</button>`}); }
  modal({title:`Transferir "${a.nome}"`, body:`<form id="fMV">
    <div class="field"><label>Nova área superior</label>
      <select name="novoPaiId" required>${destinos.map(x=>`<option value="${x.id}">${esc(x.nome)}</option>`).join('')}</select>
      <div class="hint">A subárea e tudo abaixo dela passam a responder ao responsável da área escolhida.</div>
    </div>
  </form>`, footer:`<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="bMV">Transferir</button>`});
  el('bMV').onclick=async()=>{ const f=el('fMV'); if(!f.reportValidity())return; const d=Object.fromEntries(new FormData(f)); const b=el('bMV');b.disabled=true;
    try{ await api('moverArea',{id:a.id,novoPaiId:d.novoPaiId}); toast('Área transferida.','ok'); closeModal(); go('organograma'); }catch(e){ toast(e.message,'err'); b.disabled=false; } };
}

async function modalEditarArea(a){
  // só admin ou um responsável acima desta área pode trocar quem responde por ela
  const podeTrocarResp = orgCanTransfer(a);
  let candidatos=[];
  if(podeTrocarResp){
    try{
      if(S.user.perfil==='admin'){ const {usuarios}=await api('listarUsuarios'); candidatos=usuarios.filter(u=>String(u.ativo)!=='false'); }
      else { const [{colaboradores},{disponiveis}]=await Promise.all([api('listarColaboradores'),api('listarDisponiveis')]);
             const vistos=new Set(); candidatos=[...(colaboradores||[]),...(disponiveis||[])].filter(u=>!vistos.has(u.id)&&vistos.add(u.id)); }
    }catch(e){ candidatos=[]; }
    if(a.responsavelId && !candidatos.some(u=>String(u.id)===String(a.responsavelId)))
      candidatos.unshift({id:a.responsavelId,nome:a.responsavelNome||'(responsável atual)',login:''});
  }
  modal({title:`Editar ${a.nome}`, body:`<form id="fEA">
    <div class="field"><label>Nome</label><input name="nome" required value="${esc(a.nome)}"/></div>
    <div class="field"><label>Descrição</label><input name="descricao" value="${esc(a.descricao||'')}"/></div>
    ${podeTrocarResp?`<div class="field"><label>Responsável pela área</label>
      ${pickOne('eaResp', candidatos, a.responsavelId)}
      <div class="hint">Ao trocar, a pessoa escolhida passa a liderar esta área e a responder ao responsável da área acima.</div></div>`
    :`<div class="hint">${ICON.info} Para trocar o responsável desta área, é preciso ser o administrador ou um responsável acima dela.</div>`}
  </form>`, footer:`<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="bEA">Salvar</button>`});
  el('bEA').onclick=async()=>{ const d=Object.fromEntries(new FormData(el('fEA'))); const b=el('bEA');b.disabled=true;b.textContent='Salvando…';
    try{
      const req={id:a.id,nome:d.nome,descricao:d.descricao};
      const novoResp=pickUm('eaResp');
      if(novoResp && String(novoResp)!==String(a.responsavelId)) req.responsavelId=novoResp;
      await api('atualizarArea',req); toast('Área atualizada.','ok'); closeModal(); go('organograma');
    }catch(e){ toast(e.message,'err'); b.disabled=false; b.textContent='Salvar'; } };
}

    </div>
    <div class="inline-note" style="margin-top:20px">${ICON.info}<span>As informações de remuneração ficam disponíveis apenas para a gestão.</span></div>

/* ================================================================
 *  TELA DE AVALIAÇÃO (compartilhada) — critérios ponderados 0–5
 * ================================================================ */
const PESO_METAS_UI = 20;
const SERIE_INFO = { auto:{name:'Autoavaliação',color:'#48C6F7'}, gestor:{name:'Gestor',color:'#E8B54A'}, consenso:{name:'Consenso',color:'#3DD68C'} };

function temNotas(o){ return o && (Object.keys(o.criterios||{}).length || Object.keys(o.metas||{}).length); }
function axesFor(av){ const a=(av.criterios||[]).map(c=>c.nome); if((av.metasAvaliar||[]).length) a.push('Metas'); return a; }
function serieValores(notasObj,criterios,metas){
  const vc=(notasObj&&notasObj.criterios)||{}, vm=(notasObj&&notasObj.metas)||{};
  const vals=criterios.map(c=>Number(vc[c.chave]||0));
  if(metas.length){ const arr=metas.map((m,i)=>Number(vm[i]||0)); vals.push(arr.reduce((a,b)=>a+b,0)/(arr.length||1)); }
  return vals;
}
function pontuarLocal(notas,criterios,metas){
  let p=0,w=0;
  criterios.forEach(c=>{ const v=notas.criterios?notas.criterios[c.chave]:undefined; if(v!=null&&v!==''){ p+=(Number(v)/5)*c.peso; w+=c.peso; } });
  if(metas.length){ const vals=metas.map((m,i)=>notas.metas?notas.metas[i]:undefined).filter(v=>v!=null&&v!==''); if(vals.length){ const avg=vals.reduce((a,b)=>a+Number(b),0)/vals.length; p+=(avg/5)*PESO_METAS_UI; w+=PESO_METAS_UI; } }
  if(w<=0) return null;
  return Math.round((p/w)*1000)/10;
}
function classificarLocal(p){
  if(p==null) return null;
  if(p>=90) return {nivel:'apto',rotulo:'Elegível para promoção / avanço de função'};
  if(p>=80) return {nivel:'desenvolvimento',rotulo:'Em desenvolvimento'};
  return {nivel:'manter',rotulo:'Permanecer no nível atual e elaborar plano de desenvolvimento'};
}
function scoreCard(p,label){
  const cls=classificarLocal(p);
  const color = !cls?'var(--muted)':cls.nivel==='apto'?'var(--green)':cls.nivel==='desenvolvimento'?'var(--gold)':'var(--red)';
  const pct = p==null?0:Math.max(0,Math.min(100,p));
  return `<div class="score-wrap">
    <div class="score-num" style="color:${color}">${p==null?'—':p.toFixed(1)}<small>/100</small></div>
    <div class="score-meta"><div class="k" style="font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);font-weight:700">${esc(label||'Pontuação')}</div>
      <div class="score-track"><span style="width:${pct}%;background:${color}"></span><span class="tick" style="left:80%"></span><span class="tick" style="left:90%"></span></div>
      <div style="display:flex;justify-content:space-between;font-size:.66rem;color:var(--muted2);margin-top:4px"><span>0</span><span>80 · desenv.</span><span>90 · promoção</span></div>
    </div></div>`;
}
function resultBand(av,p){
  const cls=classificarLocal(p===''||p==null?null:Number(p)); if(!cls) return '';
  let extra='';
  if(cls.nivel==='apto' && av.cargo && av.cargo.percentualAvanco){
    const perc=Number(av.cargo.percentualAvanco)||0;
    if(av.cargo.salario){ const novo=Number(av.cargo.salario)*(1+perc/100); extra=` — avanço de +${perc}% (${money(av.cargo.salario)} → ${money(novo)})`; }
    else if(perc) extra=` — avanço de +${perc}%`;
  }
  const icon = cls.nivel==='apto'?ICON.check:ICON.info;
  return `<div class="result-band result-${cls.nivel}">${icon}<span>${esc(cls.rotulo)}${extra}</span></div>`;
}
function cardReferencia(av){
  const c=av.cargo;
  const comps=c?String(c.competencias||'').split(/[,;\n]/).map(x=>x.trim()).filter(Boolean):[];
  return `<div class="card-h"><h3>Sobre a função${c&&c.nome?' — '+esc(c.nome):(av.cargoNome?' — '+esc(av.cargoNome):'')}</h3>${av.areaNome?`<span class="pill cyan"><span class="dot"></span>${esc(av.areaNome)}</span>`:''}</div>
    ${c?`<div class="ref-list">
      ${c.objetivo?`<div><div class="k">Objetivo</div><div class="v">${esc(c.objetivo)}</div></div>`:''}
      ${c.perfilEsperado?`<div><div class="k">Perfil esperado / atribuições</div><div class="v">${esc(c.perfilEsperado)}</div></div>`:''}
      ${c.criteriosPromocao?`<div><div class="k">Critérios para promoção</div><div class="v">${esc(c.criteriosPromocao)}</div></div>`:''}
      ${comps.length?`<div><div class="k">Competências do cargo</div><div class="chip-tags">${comps.map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div></div>`:''}
    </div>`:'<p class="page-sub">Cargo não informado nesta avaliação.</p>'}`;
}
function pfpmFields(av){
  return `<div class="field"><label>Pontos fortes</label><textarea id="pf">${esc(av.pontosFortes||'')}</textarea></div>
    <div class="field"><label>Pontos de melhoria</label><textarea id="pm">${esc(av.pontosMelhoria||'')}</textarea></div>`;
}
function rowEscala(kind,ref,labelHtml,val){
  return `<div class="comp-row"><div class="cn">${labelHtml}</div>
    <div class="scale" data-kind="${kind}" data-ref="${esc(String(ref))}">${[0,1,2,3,4,5].map(n=>`<button type="button" class="n${n} ${Number(val)===n?'on':''}" data-n="${n}">${n}</button>`).join('')}</div>
  </div>`;
}
function rowSimNao(idx,labelHtml,val){
  return `<div class="comp-row"><div class="cn">${labelHtml}</div>
    <div class="yn" data-kind="promo" data-ref="${idx}">
      <button type="button" class="sim ${val==='sim'?'on':''}" data-v="sim">Sim</button>
      <button type="button" class="nao ${val==='nao'?'on':''}" data-v="nao">Não</button>
    </div></div>`;
}
function blocoAvaliacao(key,criterios,metas,promocao,valores,titulo,footerHtml){
  valores=valores||{}; const vc=valores.criterios||{}, vm=valores.metas||{}, vp=valores.promocao||{};
  const critRows=criterios.map(c=>rowEscala('crit',c.chave,`${esc(c.nome)}<small>Peso ${c.peso}%</small>`,vc[c.chave])).join('');
  const metaRows=metas.length?(`<div class="block-title">Metas do consenso anterior <span class="wbadge">Peso ${PESO_METAS_UI}%</span></div>`+
    metas.map((m,i)=>rowEscala('meta',i,`<span class="meta-goal">${esc(m)}</span>`,vm[i])).join('')):'';
  const promoRows=promocao.length?(`<div class="block-title">Critérios para promoção — o colaborador atende?</div>`+
    promocao.map((q,i)=>rowSimNao(i,`<span class="meta-goal">${esc(q)}</span>`,vp[i])).join('')):'';
  return `<div class="card-h"><h3>${esc(titulo)}</h3></div>
    <div class="scale-hint"><span>0 = rendimento ruim</span><span>5 = excelente</span></div>
    <div id="scale_${key}">
      <div class="block-title">Critérios de desempenho</div>
      ${critRows}
      ${metaRows}
      ${promoRows}
    </div>
    <div style="margin-top:18px;display:flex;flex-direction:column;gap:14px">${footerHtml||''}</div>`;
}
function coletarNotas(key){
  const out={criterios:{},metas:{},promocao:{}}; const box=el('scale_'+key); if(!box) return out;
  box.querySelectorAll('.scale').forEach(sc=>{ const on=sc.querySelector('.on'); if(!on) return; const n=Number(on.dataset.n);
    if(sc.dataset.kind==='meta') out.metas[sc.dataset.ref]=n; else out.criterios[sc.dataset.ref]=n; });
  box.querySelectorAll('.yn').forEach(yn=>{ const on=yn.querySelector('.on'); if(on) out.promocao[yn.dataset.ref]=on.dataset.v; });
  return out;
}
function completo(notas,criterios,metas,promocao){
  return Object.keys(notas.criterios).length>=criterios.length
      && Object.keys(notas.metas).length>=metas.length
      && Object.keys(notas.promocao).length>=(promocao?promocao.length:0);
}
function val(id){ const e=el(id); return e?e.value:''; }
function lockedBlock(titulo,msg){
  return `<div class="card-h"><h3>${esc(titulo)}</h3></div><div class="inline-note">${ICON.info}<span>${esc(msg)}</span></div>`;
}

async function abrirAvaliacao(id){
  loading();
  const resp = await api('obterAvaliacao',{avaliacaoId:id});
  const av = resp.avaliacao || resp;   // o backend responde { avaliacao: {...} }
  S.cache.av = av;
  const isColab = String(av.colaboradorId)===String(S.user.id);   // sou a pessoa avaliada
  const criterios = av.criterios || [];
  const metas = av.metasAvaliar || [];
  const promocao = av.promocaoPerguntas || [];
  setHead(`Avaliação · ${av.colaboradorNome||'—'}`, `${av.periodo||''}${av.cargoNome?' · '+av.cargoNome:''}`, `<button class="btn btn-ghost" onclick="go('${isColab?'minhas-avaliacoes':'avaliacoes'}')">Voltar</button>`);

  const order=['aguardando_autoavaliacao','aguardando_gestor','aguardando_consenso','concluida'];
  const cur=order.indexOf(av.status);
  const stepsHtml = `<div class="steps">${[
    ['Autoavaliação','o colaborador avalia'],
    ['Avaliação do gestor','o gestor avalia'],
    ['Consenso & metas','alinhamento final'],
    ['Concluída','histórico registrado']
  ].map((s,i)=>`<div class="step ${i<cur?'done':i===cur?'current':''}"><div class="sn">ETAPA ${i+1}</div><div class="st">${s[0]}</div><div class="page-sub" style="margin-top:2px">${s[1]}</div></div>`).join('')}</div>`;

  const bBtn='btn btn-primary btn-sm', bStyle='align-self:flex-start';
  // define editor + qual série está em edição
  let editor='', editKey=null, seed=null;
  if(isColab && av.status==='aguardando_autoavaliacao'){
    editKey='auto'; seed=av.auto;
    editor = blocoAvaliacao('auto',criterios,metas,promocao,av.auto,'Sua autoavaliação',
      pfpmFields(av)+`<button class="${bBtn}" style="${bStyle}" id="bAuto">${ICON.check}<span>Enviar autoavaliação</span></button>`);
  } else if(!isColab && av.status==='aguardando_autoavaliacao'){
    editor = lockedBlock('Avaliação do gestor bloqueada','A avaliação do gestor só é liberada após o colaborador enviar a autoavaliação.');
  } else if(!isColab && av.status==='aguardando_gestor'){
    editKey='gestor'; seed=av.gestor;
    editor = blocoAvaliacao('gestor',criterios,metas,promocao,av.gestor,'Avaliação do gestor',
      `<button class="${bBtn}" style="${bStyle}" id="bGestor">${ICON.check}<span>Enviar avaliação do gestor</span></button>`);
  } else if(!isColab && av.status==='aguardando_consenso'){
    editKey='consenso'; seed = temNotas(av.consenso)?av.consenso:preConsenso(av,criterios,metas,promocao);
    editor = blocoAvaliacao('consenso',criterios,metas,promocao,seed,'Consenso (definido em conjunto)',
      pfpmFields(av)+
      `<div class="field"><label>Metas para o próximo ciclo <span class="page-sub">(uma por linha — serão avaliadas na próxima avaliação)</span></label><textarea id="metasNovas" placeholder="Ex.: Reduzir retrabalho para menos de 3%">${esc(av.metasNovas||'')}</textarea></div>`+
      `<div class="field"><label>Feedback para melhoria</label><textarea id="feedback" placeholder="Feedback final consolidado…">${esc(av.feedback||'')}</textarea></div>`+
      `<div style="display:flex;gap:10px"><button class="btn btn-ghost btn-sm" id="bSalvarConsenso">Salvar rascunho</button><button class="btn btn-gold btn-sm" id="bConcluir">${ICON.check}<span>Concluir avaliação</span></button></div>`);
  }
  const temEditor = !!editKey; // lockedBlock não é editor real

  const scoreLabel = editKey?'Pontuação parcial':'Pontuação (consenso)';
  const seedScore = editKey?seed:av.consenso;
  const scoreInicial = pontuarLocal(seedScore||{criterios:{},metas:{}},criterios,metas);
  const bandFinal = (!editKey && av.notaConsenso!==''&&av.notaConsenso!=null)?resultBand(av,av.notaConsenso):'';

  el('content').innerHTML = `${stepsHtml}
    <div class="grid cols-2" style="align-items:start">
      <div class="card">
        <div class="card-h"><h3>Versatilidade — teia de competências</h3></div>
        <div id="radarBox"></div>
        <div id="scoreLiveBox" style="margin-top:14px">${scoreCard(scoreInicial,scoreLabel)}${bandFinal}</div>
      </div>
      <div class="card">${editor || resumoAvaliacao(av,isColab)}</div>
    </div>
    <div class="card section-gap">${cardReferencia(av)}</div>
    ${editor?`<div class="card section-gap">${resumoAvaliacao(av,isColab)}</div>`:''}`;

  renderRadar(el('radarBox'), axesFor(av), montarSeries(av,isColab));
  ligarEditor(av,criterios,metas,promocao,editKey);
  if(editKey) atualizarLive(av,criterios,metas,editKey);
}

function preConsenso(av,criterios,metas,promocao){
  const out={criterios:{},metas:{},promocao:{}};
  const ac=(av.auto&&av.auto.criterios)||{}, gc=(av.gestor&&av.gestor.criterios)||{};
  criterios.forEach(c=>{ const a=Number(ac[c.chave]),g=Number(gc[c.chave]); const ha=!isNaN(a),hg=!isNaN(g); if(ha||hg) out.criterios[c.chave]=Math.round(((ha?a:g)+(hg?g:a))/2); });
  const am=(av.auto&&av.auto.metas)||{}, gm=(av.gestor&&av.gestor.metas)||{};
  metas.forEach((m,i)=>{ const a=Number(am[i]),g=Number(gm[i]); const ha=!isNaN(a),hg=!isNaN(g); if(ha||hg) out.metas[i]=Math.round(((ha?a:g)+(hg?g:a))/2); });
  const ap=(av.auto&&av.auto.promocao)||{}, gp=(av.gestor&&av.gestor.promocao)||{};
  (promocao||[]).forEach((q,i)=>{ const v=gp[i]||ap[i]; if(v) out.promocao[i]=v; });
  return out;
}

function montarSeries(av,isColab){
  const cs=av.criterios||[], ms=av.metasAvaliar||[]; const s=[];
  if(temNotas(av.auto)) s.push({name:'Autoavaliação',color:'#48C6F7',values:serieValores(av.auto,cs,ms)});
  if(!isColab && temNotas(av.gestor)) s.push({name:'Gestor',color:'#E8B54A',values:serieValores(av.gestor,cs,ms)});
  if(temNotas(av.consenso)) s.push({name:'Consenso',color:'#3DD68C',values:serieValores(av.consenso,cs,ms)});
  return s;
}

function ligarEditor(av,criterios,metas,promocao,editKey){
  document.querySelectorAll('.scale button, .yn button').forEach(b=>{
    b.onclick=()=>{ b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); atualizarLive(av,criterios,metas,editKey); };
  });
  const bAuto=el('bAuto'); if(bAuto) bAuto.onclick=async()=>{
    const notas=coletarNotas('auto'); if(!completo(notas,criterios,metas,promocao)) return toast('Responda todos os critérios, metas e perguntas de promoção.','err');
    bAuto.disabled=true; try{ await api('salvarAutoAvaliacao',{avaliacaoId:av.id,notas,pontosFortes:val('pf'),pontosMelhoria:val('pm')}); toast('Autoavaliação enviada.','ok'); abrirAvaliacao(av.id);}catch(e){ toast(e.message,'err'); bAuto.disabled=false; }
  };
  const bGestor=el('bGestor'); if(bGestor) bGestor.onclick=async()=>{
    const notas=coletarNotas('gestor'); if(!completo(notas,criterios,metas,promocao)) return toast('Responda todos os critérios, metas e perguntas de promoção.','err');
    bGestor.disabled=true; try{ await api('salvarAvaliacaoGestor',{avaliacaoId:av.id,notas}); toast('Avaliação do gestor enviada.','ok'); abrirAvaliacao(av.id);}catch(e){ toast(e.message,'err'); bGestor.disabled=false; }
  };
  const salvarCons=async(concluir)=>{
    const notas=coletarNotas('consenso'); if(concluir && !completo(notas,criterios,metas,promocao)) return toast('Defina o consenso de todos os itens (critérios, metas e promoção).','err');
    const payload={avaliacaoId:av.id,notas,metas:val('metasNovas'),feedback:val('feedback'),pontosFortes:val('pf'),pontosMelhoria:val('pm'),concluir};
    try{ await api('salvarConsenso',payload); toast(concluir?'Avaliação concluída.':'Rascunho salvo.','ok'); abrirAvaliacao(av.id);}catch(e){ toast(e.message,'err'); }
  };
  const bs=el('bSalvarConsenso'); if(bs) bs.onclick=()=>salvarCons(false);
  const bc=el('bConcluir'); if(bc) bc.onclick=()=>confirmar('Concluir a avaliação? A pontuação de consenso, a classificação e o feedback serão registrados no histórico.',()=>salvarCons(true));
}

function atualizarLive(av,criterios,metas,editKey){
  const axes=axesFor(av); const isColab=String(av.colaboradorId)===String(S.user.id); const s=[];
  const push=(o,name,color)=>{ if(temNotas(o)) s.push({name,color,values:serieValores(o,criterios,metas)}); };
  if(editKey){
    const live=coletarNotas(editKey); const info=SERIE_INFO[editKey];
    s.push({name:info.name,color:info.color,values:serieValores(live,criterios,metas)});
    const box=el('scoreLiveBox'); if(box) box.innerHTML=scoreCard(pontuarLocal(live,criterios,metas),'Pontuação parcial');
  }
  if(editKey!=='auto') push(av.auto,'Autoavaliação','#48C6F7');
  if(!isColab && editKey!=='gestor') push(av.gestor,'Gestor','#E8B54A');
  if(!isColab && editKey!=='consenso') push(av.consenso,'Consenso','#3DD68C');
  const filt=s.filter(x=>x.values.some(v=>v>0));
  renderRadar(el('radarBox'), axes, filt.length?filt:montarSeries(av,isColab));
}

function promoResumoHtml(av,isColab){
  const perg=av.promocaoPerguntas||[]; if(!perg.length) return '';
  // usa a etapa mais avançada disponível
  const fonte = (temNotas(av.consenso)&&(av.consenso.promocao)) ? av.consenso.promocao
              : (!isColab && av.gestor && av.gestor.promocao) ? av.gestor.promocao
              : (av.auto && av.auto.promocao) ? av.auto.promocao : null;
  if(!fonte) return '';
  const atende=perg.filter((q,i)=>fonte[i]==='sim').length;
  const linhas=perg.map((q,i)=>{ const v=fonte[i]; const cls=v==='sim'?'green':v==='nao'?'red':'gray';
    return `<div style="display:flex;justify-content:space-between;gap:12px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-soft)"><span class="v" style="font-size:.86rem">${esc(q)}</span><span class="pill ${cls}"><span class="dot"></span>${v==='sim'?'Sim':v==='nao'?'Não':'—'}</span></div>`;}).join('');
  return `<div style="margin-top:6px"><div class="k">Critérios para promoção — ${atende}/${perg.length} atendidos</div>${linhas}</div>`;
}
function resumoAvaliacao(av,isColab){
  const rows=[];
  if(av.pontosFortes) rows.push(['Pontos fortes',av.pontosFortes]);
  if(av.pontosMelhoria) rows.push(['Pontos de melhoria',av.pontosMelhoria]);
  if(av.metasNovas) rows.push(['Metas para o próximo ciclo',av.metasNovas]);
  if(av.feedback) rows.push(['Feedback',av.feedback]);
  const kt='font-size:.7rem;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.05em';
  return `<div class="card-h"><h3>Resumo</h3>${statusPill(av.status)}</div>
    <div style="display:flex;gap:22px;margin-bottom:16px;flex-wrap:wrap">
      <div><div style="${kt}">Auto</div><div class="mono" style="font-size:1.3rem">${nota(av.notaAuto)}</div></div>
      ${!isColab?`<div><div style="${kt}">Gestor</div><div class="mono" style="font-size:1.3rem;color:var(--gold)">${nota(av.notaGestor)}</div></div>`:''}
      <div><div style="${kt}">Consenso</div><div class="mono" style="font-size:1.3rem;color:var(--green)">${nota(av.notaConsenso)}</div></div>
    </div>
    ${(av.notaConsenso!==''&&av.notaConsenso!=null)?resultBand(av,av.notaConsenso):''}
    ${rows.length?`<div class="kv">${rows.map(r=>`<div><div class="k">${r[0]}</div><div class="v">${esc(r[1])}</div></div>`).join('')}</div>`:'<p class="page-sub">Ainda sem observações registradas.</p>'}
    ${promoResumoHtml(av,isColab)}`;
}

/* ================================================================
 *  RADAR / TEIA DE ARANHA (SVG puro)
 * ================================================================ */
function renderRadar(container, axes, series){
  if(!container) return;
  const N=axes.length; if(N<3){ container.innerHTML='<p class="empty">Defina ao menos 3 competências no cargo para gerar a teia.</p>'; return; }
  const size=320, cx=size/2, cy=size/2, R=size/2-52, rings=5, max=5;
  const pt=(i,r)=>{ const ang=-Math.PI/2 + i*2*Math.PI/N; return [cx+r*Math.cos(ang), cy+r*Math.sin(ang)]; };
  let g='';
  // anéis
  for(let ring=1;ring<=rings;ring++){ const r=R*ring/rings; let p=''; for(let i=0;i<N;i++){ const [x,y]=pt(i,r); p+=`${i?'L':'M'}${x.toFixed(1)},${y.toFixed(1)} `; } g+=`<path d="${p}Z" fill="none" stroke="#28335A" stroke-width="1" opacity="${ring===rings?.9:.45}"/>`; }
  // eixos + rótulos
  for(let i=0;i<N;i++){ const [x,y]=pt(i,R); g+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#28335A" stroke-width="1" opacity=".5"/>`;
    const [lx,ly]=pt(i,R+22); const anchor = Math.abs(lx-cx)<10?'middle':(lx>cx?'start':'end');
    const label = axes[i].length>14?axes[i].slice(0,13)+'…':axes[i];
    g+=`<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" fill="#8D99B8" font-size="10.5" font-family="Inter,sans-serif" font-weight="500" text-anchor="${anchor}">${esc(label)}</text>`;
  }
  // séries
  series.forEach(s=>{
    let p=''; const pts=[];
    for(let i=0;i<N;i++){ const v=Math.max(0,Math.min(max,s.values[i]||0)); const [x,y]=pt(i,R*v/max); pts.push([x,y]); p+=`${i?'L':'M'}${x.toFixed(1)},${y.toFixed(1)} `; }
    g+=`<path d="${p}Z" fill="${s.color}" fill-opacity=".16" stroke="${s.color}" stroke-width="2" stroke-linejoin="round"/>`;
    pts.forEach(([x,y])=>{ g+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.2" fill="${s.color}"/>`; });
  });
  const legend = series.length?`<div class="radar-legend">${series.map(s=>`<div class="legend-item"><span class="legend-swatch" style="background:${s.color}"></span><span>${esc(s.name)}</span></div>`).join('')}</div>`:'';
  container.innerHTML = `<div class="radar-wrap">
    <svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="max-width:100%">${g}</svg>${legend}</div>
    ${!series.length?'<p class="page-sub" style="text-align:center">As notas aparecerão na teia conforme forem preenchidas.</p>':''}`;
}

/* ================================================================
 *  HELPERS DE UI
 * ================================================================ */
function emptyState(titulo,texto,btnLabel,btnAction){
  return `<div class="card"><div class="empty">${ICON.empty}<h3 style="margin-bottom:8px">${esc(titulo)}</h3><p>${esc(texto)}</p>
    ${btnLabel?`<button class="btn btn-primary" style="margin-top:18px" onclick="${btnAction}">${ICON.plus}<span>${esc(btnLabel)}</span></button>`:''}</div></div>`;
}
function confirmar(msg,onOk){
  modal({title:'Confirmação', body:`<p class="v" style="line-height:1.6">${esc(msg)}</p>`,
    footer:`<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="bConf">Confirmar</button>`});
  el('bConf').onclick=()=>{ closeModal(); onOk(); };
}
</script>
